<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Beacon Morris - West Malvern's Morris Side</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                background-image: url("images/Malvern-Hills-Walk.webp");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }

            .container {
                padding: 20px;
                background-color: rgba(176, 235, 179, 0.9);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
                border-radius: 12px;
                margin-top: 20px;
            }
            .my-custom-row {
                
                height: 800px;
                padding: 20px;
                margin-bottom: 15px;
            }
        </style>
        
        <div class="container">
            <div class="row">
                <div class="col">Col1</div>
                <div class="col"><img src="images/Beacon Logo Shadow.png" alt="Beacon Logo" class="img-fluid"></div>
                <div class="col">Col3</div>
            </div>
            <div class="row my-custom-row">
                <div class="col"><div class="p-3 border bg-light">Col One</div></div>
                <div class="col"><div class="p-3 border bg-light">Welcome to Beacon Morris</div></div>
                <div class="col"><div class="p-3 border bg-light">Col Three</div></div>
            </div>
            <div class="row my-custom-row">
                <div class="col"><div class="p-3 border bg-light">Col One</div></div>
                <div class="col"><div class="p-3 border bg-light">Col Two</div></div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
