<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Beacon Morris - West Malvern's Morris Side</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                background-image: url("images/Malvern-Hills-Walk.webp");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }

            .container {
                padding: 20px;
                background-color: rgba(176, 235, 179, 0.9);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
                border-radius: 12px;
                margin-top: 20px;
            }
            .Big-text-row {
                
                padding: 5px;
                margin-bottom: 0px;
                text-align: center;
            }
            .Huge-text-row {
                background-color: #7A8F56;
                color: #ffffff;
                padding: 5px;
                margin-bottom: 0px;
                text-align: center;
            }
            .Normal-white-box-row {
                padding: 10px;
                border-radius: 12px;
                margin-bottom: 0px;
                text-align: center;
            }
            .Medium-text-row {
                color: #05530f;
                padding: 0px;
                margin-bottom: 20px;
                text-align: center;
            }
            .video-square {
                position: relative;
                width: 100%;
                aspect-ratio: 16 / 9;
                overflow: hidden;
                background-color: #f2f2f2;
                border-radius: 0.25rem;
            }
            .video-square iframe {
                width: 100%;
                height: 100%;
                border: 0;
            }
        </style>
        
        <div class="container">
            <div class="row">
                <!--<div class="col">Col1</div>-->
                <div class="col" style="display: flex; justify-content: center; align-items: center;"><img src="images/Beacon Logo v2.jpg" alt="Beacon Logo" class="rounded-circle shadow-lg" style="max-width: 100%; height: auto;"></div>
                <!--<div class="col">Col3</div>-->
            </div>
            <div class="row Big-text-row">
                
                <div class="col"><h1 class="display-3">Welcome to</h1></div>
        
            </div>
             <div class="row Huge-text-row">
                
                <div class="col"><h1 class="display-1"><b>Beacon Morris</b></h1></div>
        
            </div>
            <div class="row Big-text-row">
                
                <div class="col"><h1 class="display-3">of West Malvern!</h1></div>
        
            </div>
            <div class="row Medium-text-row">
                
                <div class="col"><h2 class="display-8"><i>A friendly bunch of people who like dancing on the hills and making noise!</i></h2></div>
        
            </div>
            <div class="row Normal-white-box-row">
                <div class="col"><div class="p-1 border"><img src="images/Beacon Photo 2.jpg" alt="Photo of Beacon Morris" class="rounded-square shadow-lg" style="max-width: 100%; height: auto;"></div></div>
                <div class="col"><div class="p-1 border"><div class="video-square">
  <iframe src="https://www.youtube.com/embed/AdyG0vthXw8?rel=0" title="Beacon Morris video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
</div></div></div>
            </div>
            <div class="row Normal-white-box-row">
                <div class="col"><div class="p-1 border"><img src="images/Beacon Photo 1.jpg" alt="Photo of Beacon Morris" class="rounded-square shadow-lg" style="max-width: 100%; height: auto;"></div></div>
                <div class="col"><div class="p-1 border"><img src="images/Beacon Photo 3.jpg" alt="Photo of Beacon Morris" class="rounded-square shadow-lg" style="max-width: 100%; height: auto;"></div></div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
